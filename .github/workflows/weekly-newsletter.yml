name: 📺 Télé7Sport Weekly Newsletter

on:
  schedule:
    - cron: '0 7 * * 1'

  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python3 --version
          pip install --no-cache-dir -r requirements.txt
          pip list

      - name: Create favorites.json from secret (if set)
        run: |
          if [ -n "$FAVORITES_JSON" ]; then
            echo "$FAVORITES_JSON" > favorites.json
          else
            cp favorites.example.json favorites.json
          fi
        env:
          FAVORITES_JSON: ${{ secrets.FAVORITES_JSON }}

      - name: Generate and send newsletter
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
          LANGUAGE: ${{ secrets.LANGUAGE }}
        run: |
          python3 -c "import requests; import bs4; import pytz; print('All imports OK')"
          python3 run.py once

      - name: Upload newsletter artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletter-${{ github.run_id }}
          path: out/
          retention-days: 30
